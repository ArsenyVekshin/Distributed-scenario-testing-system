# Gradle 9.x — JVM для запуска Gradle может быть 21+ (в т.ч. JDK 26); целевая версия байткода проекта задаётся в build.gradle.kts (jvmToolchain 21).
# Сборка в Docker/Podman на машине с ограниченной RAM (часто 2 GiB у podman-machine-default).
# in-process: Kotlin компилируется внутри JVM Gradle — нет отдельного Kotlin daemon → меньше пик памяти.
kotlin.compiler.execution.strategy=in-process
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=false
org.gradle.workers.max=1
